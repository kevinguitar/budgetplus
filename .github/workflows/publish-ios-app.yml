name: Publish iOS app to App Store

on:
  push:
    tags:
      - '*-ios'

jobs:
  build-and-upload:
    runs-on: macos-latest
    # Export the version and build number so the Linux runner knows what to look for
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Latest Stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Parse version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG%-ios}"
          BUILD_NUMBER="${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Parsed version: $VERSION ($BUILD_NUMBER)"

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          gradle-home-cache-strict-match: true

      - name: Setup Secrets
        env:
          REVENUECAT_ANDROID_API_KEY: ${{ secrets.REVENUECAT_ANDROID_API_KEY }}
          REVENUECAT_IOS_API_KEY: ${{ secrets.REVENUECAT_IOS_API_KEY }}
          GOOGLE_SERVICES_PLIST: ${{ secrets.IOS_GOOGLE_SERVICES_PLIST }}
        run: |
          echo REVENUECAT_ANDROID_API_KEY=$REVENUECAT_ANDROID_API_KEY > ./local.properties
          echo REVENUECAT_IOS_API_KEY=$REVENUECAT_IOS_API_KEY >> ./local.properties
          echo $GOOGLE_SERVICES_PLIST | base64 -d > ./iosApp/iosApp/GoogleService-Info.plist

      - name: Install Apple Certificates and Profiles
        env:
          DIST_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          DEV_CERT_BASE64: ${{ secrets.IOS_DEVELOPMENT_CERTIFICATE_BASE64 }}
          DEV_CERT_PASSWORD: ${{ secrets.IOS_DEVELOPMENT_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          APP_PROFILE_BASE64: ${{ secrets.IOS_DISTRIBUTION_PROVISIONING_PROFILE_BASE64 }}
          EXT_PROFILE_BASE64: ${{ secrets.IOS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          # Create and unlock temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          
          # Import Distribution Cert
          DIST_CERT_PATH=$RUNNER_TEMP/dist_cert.p12
          printf '%s' "$DIST_CERT_BASE64" | base64 --decode -o $DIST_CERT_PATH
          security import $DIST_CERT_PATH -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          
          # Import Development Cert
          DEV_CERT_PATH=$RUNNER_TEMP/dev_cert.p12
          printf '%s' "$DEV_CERT_BASE64" | base64 --decode -o $DEV_CERT_PATH
          security import $DEV_CERT_PATH -P "$DEV_CERT_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          
          # Bypass UI prompts for codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          # Install Provisioning Profiles physically to the runner
          PROVISIONING_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROVISIONING_DIR"
          printf '%s' "$APP_PROFILE_BASE64" | base64 --decode -o "$PROVISIONING_DIR/app.mobileprovision"
          printf '%s' "$EXT_PROFILE_BASE64" | base64 --decode -o "$PROVISIONING_DIR/ext.mobileprovision"

      - name: Set JAVA_HOME for Xcode build phase
        run: echo "export JAVA_HOME=$JAVA_HOME" > ./iosApp/.xcode.env

      - name: Cache Kotlin/Native compiler and platform libs
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Set version in Config.xcconfig and Extension
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUMBER="${{ github.run_number }}"
          
          # 1. Update the main app's config
          sed -i '' "s/^MARKETING_VERSION=.*/MARKETING_VERSION=$VERSION/" iosApp/Configuration/Config.xcconfig
          sed -i '' "s/^CURRENT_PROJECT_VERSION=.*/CURRENT_PROJECT_VERSION=$BUILD_NUMBER/" iosApp/Configuration/Config.xcconfig
          echo "Updated Config.xcconfig:"
          cat iosApp/Configuration/Config.xcconfig
          echo "Updated version to $VERSION ($BUILD_NUMBER) in Config.xcconfig"

      - name: Setup App Store Connect API Key
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p $(pwd)/private_keys
          API_KEY_PATH="$(pwd)/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o "$API_KEY_PATH"
          echo "API_KEY_PATH=$API_KEY_PATH" >> $GITHUB_ENV

      - name: Archive iOS App
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/iosApp.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -skipPackagePluginValidation \
            -quiet

      - name: Export Local IPA
        run: |
          cat > ./build/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>destination</key>
              <string>export</string> 
              <key>manageAppVersionAndBuildNumber</key>
              <false/>
              <key>teamID</key>
              <string>MU6R4JU7G8</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.kevlina.budgetplus</key>
                  <string>BudgetPlusApp</string>
                  <key>com.kevlina.budgetplus.NotificationServiceExtension</key>
                  <string>NotificationServiceExtension</string>
              </dict>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath ./build/iosApp.xcarchive \
            -exportOptionsPlist ./build/ExportOptions.plist \
            -exportPath ./build/output \
            -allowProvisioningUpdates \
            -quiet

      - name: Fastlane Upload (No Waiting)
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_FILEPATH: ${{ env.API_KEY_PATH }}
        run: |
          IPA_FILE=$(find ./build/output -name "*.ipa" | head -n 1)
          fastlane run upload_to_app_store \
            app_identifier:"com.kevlina.budgetplus" \
            app_version:"${{ steps.version.outputs.version }}" \
            build_number:"${{ github.run_number }}" \
            ipa:"$IPA_FILE" \
            submit_for_review:false \
            skip_metadata:true \
            force:true

      - name: Clean up keychain
        if: ${{ always() }}
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  wait-and-submit:
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'

      - name: Install Fastlane
        run: gem install fastlane

      - name: Setup App Store Connect API Key
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p $(pwd)/private_keys
          API_KEY_PATH="$(pwd)/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o "$API_KEY_PATH"
          echo "API_KEY_PATH=$API_KEY_PATH" >> $GITHUB_ENV

      - name: Wait for Apple Processing and Submit with Metadata
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_FILEPATH: ${{ env.API_KEY_PATH }}
        run: |
          MAX_RETRIES=30
          RETRY_INTERVAL=60
          
          echo "Polling App Store Connect to check if the build is processed..."
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES..."
          
            # The 'if' statement prevents GitHub Actions from failing the job immediately on a Fastlane error
            if fastlane run upload_to_app_store \
              app_identifier:"com.kevlina.budgetplus" \
              app_version:"${{ needs.build-and-upload.outputs.version }}" \
              build_number:"${{ needs.build-and-upload.outputs.build_number }}" \
              skip_binary_upload:true \
              submit_for_review:true \
              automatic_release:false \
              phased_release:false \
              force:true \
              metadata_path:"./fastlane/metadata"; then
          
              echo "✅ Build processed and submitted for review successfully!"
              exit 0
            else
              echo "⚠️ Build not yet processed (or another error occurred). Waiting $RETRY_INTERVAL seconds before retrying..."
              sleep $RETRY_INTERVAL
            fi
          done
          
          echo "❌ Timed out waiting for Apple to process the build after $MAX_RETRIES attempts."
          exit 1
